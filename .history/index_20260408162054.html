<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Animation Task</title>

    <style>

        *{margin: 0%;
padding: 0%;}
.main{
    display: flex;
}
.road{
    height: 600px;
    width: 100%;
     display: flex;
     justify-content: center;
     align-items: end;
}
body{
    background-image: url(./assets/image/vecteezy_horizontal-or-landscape-of-smooth-asphalt-road-on-the-wide_53959927.jpg);
    background-size:cover;
     animation: road linear infinite 5s ;
     background-repeat: repeat-x;
     display: flex;
     justify-content: center;
     align-items: end;
     overflow: hidden;

}
.road img{
    animation: road ease-in-out infinite 5s ;
    mask-image: repeating-linear-gradient(100%);
  
}
.car-tyer{
    width:100%;
    height: 200;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 320px;
    position: absolute;
    top: 405px;
    left: 26px;
    /* background-color: aquamarine; */
}
.cartyer img{
    animation: run linear 999999999990s;
}
@keyframes road {
   from { background-position: 0 0; }
    to   { background-position: -1800vh 0;  }
    
}

@keyframes run{
    100%{ transform:rotate(70999999999999999920deg);}
}
audio{
    position: absolute;
    display: none;
    

}


    </style>
    

</head>
<body>
    <div class="mainn">
        <img src="" width="" alt="">
        <div class="car-tyer">
            
            <img  src="./assets/image/pngwing.com (2).png" alt="" height="110px" width="110px">
            <img src="./assets/image/pngwing.com (2).png" alt="" height="110px" width="110px">
        </div>
        <div class="road">
            <img src="https://full-stack-developer-classes-abzr.vercel.app/assets/image/pngwing.com%20(1).png" alt="" height="400px" width="85%">
            
        </div>
    </div>
</body>
</html>
